[project]
name = "scaleway-object-storage"
version = "0.1.0"
requires-python = ">=3.14.2,<3.15"
authors = [{ name = "Björn Petersen", email = "git@bjoernpetersen.net" }]
classifiers = [
    "Private :: Do Not Upload",
]

dependencies = [
    "aiobotocore==3.3.0",
]

[dependency-groups]
dev = [
    "homeassistant==2026.3.2",
    "mypy ==1.19.1",
    "pytest ==9.0.2",
    "pytest-asyncio==1.3.0",
    "ruff ==0.15.6",
    "types-aiobotocore[s3]==3.3.0",
]

[build-system]
requires = ["uv_build==0.10.10"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "custom_components"

[tool.pytest]
strict = true
addopts = [
    "--import-mode=importlib",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "FAST",
    "FURB",
    "G",
    "I001",
    "LOG",
    "PTH",
    "Q",
    "TC001",
    "TC002",
    "TC003",
    "TC004",
    "TC005",
    "UP",
]
ignore = [
    # redundant-open-modes
    "UP015",
]
